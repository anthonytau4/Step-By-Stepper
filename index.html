<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Step by Stepper</title>
  <link rel="stylesheet" href="app.css">
  <style>
    body{margin:0;background:#0a0a0a;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    #boot-fallback{min-height:100vh;display:grid;place-items:center;text-align:center;padding:24px}
    .boot-card{display:flex;flex-direction:column;align-items:center;gap:14px}
    .icon-squircle{width:72px;height:72px;border-radius:22px;background:#0b1028;display:grid;place-items:center;color:#f5f5f5;box-shadow:0 8px 30px rgba(0,0,0,.35)}
    .icon-squircle svg{width:38px;height:38px}
    .boot-card h1{margin:0;font-size:2rem;font-weight:800;letter-spacing:-.03em}
    .boot-card p{margin:0;font-size:1.125rem;color:#a3a3a3}
    .boot-card small{max-width:26rem;color:#737373;line-height:1.45}
  </style>
  <script>
    window.addEventListener('error', function(){
      var el=document.getElementById('boot-note');
      if(el){el.textContent='Still loading? Keep app.css, app.js, glossary-data.js, and index.html together in the same folder.';}
    });
  </script>
  <script defer src="app.js"></script>
</head>
<body>
  <div id="boot-fallback">
    <div class="boot-card">
      <div class="icon-squircle"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 17h5l-1.4-1.4A2 2 0 0 1 18 14.2V11a6 6 0 1 0-12 0v3.2a2 2 0 0 1-.6 1.4L4 17h5m6 0a3 3 0 1 1-6 0m6 0H9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <h1>Step by Stepper</h1>
      <p>Loading…</p>
      <small id="boot-note">Optimized plain-JS build.</small>
    </div>
  </div>
</body>
</html>
