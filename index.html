<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <title>Step by Stepper</title>
    <link rel="stylesheet" href="./assets/app.css" />
    <style>
      html, body, #root { min-height: 100%; }
      body { margin: 0; background: #0a0a0a; }
      .boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0a0a0a; color: #e5e7eb; font-family: Inter, system-ui, sans-serif;
      }
      .boot__card {
        text-align: center; padding: 20px 24px; border-radius: 16px;
        background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      }
      .boot__title { font-weight: 800; letter-spacing: .04em; text-transform: uppercase; font-size: 14px; }
      .boot__sub { margin-top: 8px; color: #9ca3af; font-size: 12px; }
    </style>
    <script>
      window.addEventListener('load', function () {
        var boot = document.getElementById('boot');
        setTimeout(function(){ if (boot) boot.remove(); }, 250);
      });
    </script>
    <script defer src="./assets/app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot" class="boot">
      <div class="boot__card">
        <div class="boot__title">Step by Stepper</div>
        <div class="boot__sub">Loading the optimized multi-file build…</div>
      </div>
    </div>
  </body>
</html>
