<!--
  GitHub Pages / Jekyll head include example for Step by Stepper.
  If your theme already provides a _includes/head.html file, keep its existing
  content and add the favicon lines below near the top of <head>.

  Note:
  The current uploaded Step by Stepper build is a static index.html site, so the
  favicon is already linked directly in index.html as well.
-->
<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1">
{%- seo -%}
<link rel="icon" href="{{ '/favicon.ico' | relative_url }}" sizes="any">
<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="apple-touch-icon" href="{{ '/apple-touch-icon.png' | relative_url }}">
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
{%- feed_meta -%}
